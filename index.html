<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Подготовка к обучению вайбкодингу</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,300..800;1,300..800&family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,300..600&family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    /* COLORS */
    :root {
      --clay-50:#FBF1EC;--clay-100:#F5DDD0;--clay-200:#ECC1AC;--clay-300:#E3A687;
      --clay-400:#DE8B6C;--clay-500:#D97757;--clay-600:#C5633F;--clay-700:#A44C2E;--clay-800:#7E3A24;
      --neutral-0:#FFFFFF;--neutral-50:#FAF9F5;--neutral-100:#F0EEE6;--neutral-150:#E9E6DC;
      --neutral-200:#DDD9CC;--neutral-300:#C6C1AF;--neutral-400:#A8A290;--neutral-500:#87826F;
      --neutral-600:#6A6657;--neutral-700:#4C4940;--neutral-800:#2B2A25;--neutral-900:#141413;
      --green-500:#5B7F63;--green-50:#EBF1EB;--amber-500:#C2912F;--amber-50:#F8F0DC;
      --red-500:#BE4B3B;--red-50:#F8E7E3;--blue-500:#5B7B9A;--blue-50:#E7EDF2;
      --surface-canvas:var(--neutral-100);--surface-default:var(--neutral-50);
      --surface-raised:var(--neutral-0);--surface-sunken:var(--neutral-150);
      --text-primary:var(--neutral-900);--text-secondary:var(--neutral-600);
      --text-muted:var(--neutral-500);--text-disabled:var(--neutral-400);--text-on-accent:#FFFFFF;
      --border-subtle:var(--neutral-150);--border-default:var(--neutral-200);--border-strong:var(--neutral-300);
      --accent:var(--clay-500);--accent-hover:var(--clay-600);--accent-pressed:var(--clay-700);
      --accent-subtle:var(--clay-50);--accent-border:var(--clay-200);--link:var(--clay-700);
      --focus-ring:color-mix(in oklch,var(--clay-500) 45%,transparent);
      --success:var(--green-500);--success-bg:var(--green-50);
      --warning:var(--amber-500);--warning-bg:var(--amber-50);
      --danger:var(--red-500);--danger-bg:var(--red-50);
    }
    /* TYPOGRAPHY */
    :root {
      --font-sans:'Hanken Grotesk',ui-sans-serif,system-ui,-apple-system,sans-serif;
      --font-serif:'Newsreader',Georgia,serif;
      --font-mono:'IBM Plex Mono',ui-monospace,monospace;
      --text-2xs:11px;--text-xs:12px;--text-sm:14px;--text-base:16px;--text-md:18px;
      --text-lg:20px;--text-xl:24px;--text-2xl:30px;--text-3xl:38px;--text-5xl:60px;
      --weight-light:300;--weight-regular:400;--weight-medium:500;--weight-semibold:600;--weight-bold:700;
      --leading-tight:1.08;--leading-snug:1.22;--leading-normal:1.5;--leading-relaxed:1.65;
      --tracking-tight:-0.02em;--tracking-caps:0.08em;
      --display-font:var(--font-serif);
    }
    /* SPACING / RADII / SHADOWS / MOTION */
    :root {
      --space-1:4px;--space-2:8px;--space-3:12px;--space-4:16px;--space-5:20px;
      --space-6:24px;--space-7:32px;--space-8:40px;--space-9:48px;--space-12:96px;
      --radius-xs:4px;--radius-sm:8px;--radius-md:12px;--radius-lg:16px;
      --radius-xl:24px;--radius-pill:999px;
      --shadow-xs:0 1px 2px rgba(20,20,19,.05);
      --shadow-sm:0 1px 3px rgba(20,20,19,.06),0 1px 2px rgba(20,20,19,.04);
      --shadow-md:0 4px 14px rgba(20,20,19,.07),0 2px 4px rgba(20,20,19,.04);
      --shadow-lg:0 14px 36px rgba(20,20,19,.10),0 4px 10px rgba(20,20,19,.05);
      --shadow-xl:0 28px 64px rgba(20,20,19,.14);
      --shadow-focus:0 0 0 3px var(--focus-ring);
      --container-wide:1280px;
      --ease-standard:cubic-bezier(.32,.72,0,1);--ease-out:cubic-bezier(.16,1,.3,1);
      --duration-fast:120ms;--duration-normal:200ms;--duration-slow:360ms;
      --z-sticky:100;--z-modal:1000;--z-toast:1500;
    }
    /* BASE */
    *,*::before,*::after{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{background:var(--surface-canvas);color:var(--text-primary);font-family:var(--font-sans);
      font-size:var(--text-base);line-height:var(--leading-normal);-webkit-font-smoothing:antialiased}
    h1,h2,h3,h4,h5,h6{margin:0;line-height:var(--leading-snug)}
    p{margin:0}
    a{color:var(--link);text-underline-offset:2px}
    ::selection{background:var(--clay-100);color:var(--neutral-900)}
    :focus-visible{outline:none;box-shadow:var(--shadow-focus);border-radius:var(--radius-xs)}
    button{font-family:var(--font-sans)}
    #root{min-height:100%}
    ::-webkit-scrollbar{width:10px;height:10px}
    ::-webkit-scrollbar-thumb{background:var(--neutral-300);border-radius:99px;border:3px solid var(--surface-canvas)}

    /* COMPONENT STYLES */
    .cds-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
      font-family:var(--font-sans);font-size:var(--text-sm);font-weight:var(--weight-medium);
      line-height:1;padding:0 16px;height:38px;border-radius:var(--radius-pill);
      border:1px solid transparent;cursor:pointer;white-space:nowrap;
      transition:background var(--duration-fast),border-color var(--duration-fast),color var(--duration-fast);
      -webkit-user-select:none;user-select:none}
    .cds-btn:active{transform:translateY(.5px) scale(.99)}
    .cds-btn:focus-visible{outline:none;box-shadow:var(--shadow-focus)}
    .cds-btn--full{width:100%}
    .cds-btn--sm{height:30px;font-size:var(--text-xs);padding:0 12px;gap:6px}
    .cds-btn--primary{background:var(--accent);color:var(--text-on-accent)}
    .cds-btn--primary:hover{background:var(--accent-hover)}
    .cds-btn--secondary{background:var(--surface-raised);color:var(--text-primary);border-color:var(--border-strong)}
    .cds-btn--secondary:hover{background:var(--neutral-50);border-color:var(--neutral-400)}
    .cds-btn--ghost{background:transparent;color:var(--text-secondary)}
    .cds-btn--ghost:hover{background:color-mix(in oklch,var(--neutral-900) 6%,transparent);color:var(--text-primary)}
    .cds-btn:disabled{opacity:.45;cursor:not-allowed;pointer-events:none}
    .cds-btn svg{width:16px;height:16px;flex:none}
    .cds-btn--sm svg{width:14px;height:14px}

    .cds-icon-btn{display:inline-flex;align-items:center;justify-content:center;
      width:38px;height:38px;border-radius:var(--radius-md);border:1px solid transparent;
      background:transparent;color:var(--text-secondary);cursor:pointer;
      transition:background var(--duration-fast),color var(--duration-fast)}
    .cds-icon-btn:hover{background:color-mix(in oklch,var(--neutral-900) 6%,transparent);color:var(--text-primary)}
    .cds-icon-btn--solid{background:var(--accent);color:#fff}
    .cds-icon-btn--solid:hover{background:var(--accent-hover)}
    .cds-icon-btn svg{width:18px;height:18px}

    .cds-badge{display:inline-flex;align-items:center;gap:5px;font-size:var(--text-xs);
      font-weight:var(--weight-medium);padding:4px 9px;border-radius:var(--radius-pill);
      border:1px solid transparent;white-space:nowrap}
    .cds-badge svg{width:12px;height:12px}
    .cds-badge--neutral{background:var(--neutral-150);color:var(--text-secondary)}
    .cds-badge--success{background:var(--success-bg);color:var(--success)}

    .cds-field{display:flex;flex-direction:column;gap:6px}
    .cds-label{font-size:var(--text-sm);font-weight:var(--weight-medium);color:var(--text-primary)}
    .cds-label__hint{font-weight:var(--weight-regular);color:var(--text-muted);margin-left:6px}
    .cds-input,.cds-textarea{font-family:var(--font-sans);font-size:var(--text-sm);color:var(--text-primary);
      background:var(--surface-raised);border:1px solid var(--border-default);
      border-radius:var(--radius-md);padding:0 12px;height:40px;width:100%}
    .cds-textarea{height:auto;padding:10px 12px;line-height:1.5;resize:vertical;min-height:88px}
    .cds-input::placeholder,.cds-textarea::placeholder{color:var(--text-muted)}
    .cds-input:hover,.cds-textarea:hover{border-color:var(--border-strong)}
    .cds-input:focus,.cds-textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--focus-ring)}

    /* APP LAYOUT */
    .app{min-height:100vh;display:flex;flex-direction:column}
    .topbar{position:sticky;top:0;z-index:var(--z-sticky);
      background:color-mix(in oklch,var(--surface-default) 88%,transparent);
      backdrop-filter:saturate(1.4) blur(14px);border-bottom:1px solid var(--border-subtle)}
    .topbar__inner{max-width:var(--container-wide);margin:0 auto;padding:0 var(--space-7);height:64px;
      display:flex;align-items:center;gap:var(--space-5)}
    .brand{display:flex;align-items:center;gap:11px;flex:none}
    .brand__name{font-size:var(--text-md);font-weight:var(--weight-semibold);letter-spacing:-.01em}
    .brand__name span{color:var(--text-muted);font-weight:var(--weight-regular)}
    .topbar__progress{flex:1;display:flex;align-items:center;gap:var(--space-4);min-width:0;max-width:460px}
    .miniprog{flex:1;height:7px;border-radius:99px;background:var(--neutral-200);overflow:hidden;min-width:80px}
    .miniprog__fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--clay-400),var(--clay-600));
      transition:width var(--duration-slow) var(--ease-out)}
    .miniprog__label{font-size:var(--text-sm);font-weight:var(--weight-semibold);color:var(--text-secondary);
      font-variant-numeric:tabular-nums;flex:none;white-space:nowrap}
    .topbar__actions{display:flex;align-items:center;gap:var(--space-2);flex:none}

    .osseg{display:inline-flex;gap:2px;padding:3px;background:var(--neutral-150);border-radius:var(--radius-pill)}
    .osseg__btn{display:inline-flex;align-items:center;gap:6px;border:none;cursor:pointer;background:transparent;
      color:var(--text-secondary);font-size:var(--text-sm);font-weight:var(--weight-medium);
      padding:5px 13px;border-radius:var(--radius-pill);transition:background var(--duration-fast),color var(--duration-fast)}
    .osseg__btn:hover{color:var(--text-primary)}
    .osseg__btn[aria-pressed="true"]{background:var(--surface-raised);color:var(--text-primary);box-shadow:var(--shadow-xs)}
    .osseg__btn svg{width:15px;height:15px}

    .layout{max-width:var(--container-wide);margin:0 auto;width:100%;
      padding:var(--space-8) var(--space-7) var(--space-12);
      display:grid;grid-template-columns:300px 1fr;gap:var(--space-9);align-items:start}
    @media(max-width:940px){.layout{grid-template-columns:1fr;gap:var(--space-7)}}

    .stepper{position:sticky;top:88px;display:flex;flex-direction:column;gap:2px}
    @media(max-width:940px){.stepper{position:static}}
    .stepper__head{padding:0 var(--space-3) var(--space-3)}
    .stepper__title{font-size:var(--text-xs);font-weight:var(--weight-semibold);letter-spacing:var(--tracking-caps);
      text-transform:uppercase;color:var(--text-muted)}
    .steprow{display:flex;align-items:center;gap:var(--space-3);width:100%;text-align:left;
      background:transparent;border:none;cursor:pointer;padding:9px var(--space-3);border-radius:var(--radius-md);
      transition:background var(--duration-fast);position:relative}
    .steprow:hover{background:color-mix(in oklch,var(--neutral-900) 4%,transparent)}
    .steprow[aria-current="true"]{background:var(--accent-subtle)}
    .steprow[aria-current="true"]::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:3px;
      border-radius:99px;background:var(--accent)}
    .steprow__dot{flex:none;width:26px;height:26px;border-radius:50%;display:grid;place-items:center;
      font-size:var(--text-xs);font-weight:var(--weight-semibold);font-variant-numeric:tabular-nums;
      background:var(--surface-raised);border:1.5px solid var(--border-strong);color:var(--text-secondary);
      transition:all var(--duration-normal) var(--ease-standard)}
    .steprow__dot svg{width:14px;height:14px}
    .steprow[data-done="true"] .steprow__dot{background:var(--success);border-color:var(--success);color:#fff}
    .steprow[aria-current="true"] .steprow__dot{border-color:var(--accent);color:var(--accent)}
    .steprow__body{min-width:0;flex:1}
    .steprow__label{display:block;font-size:var(--text-sm);font-weight:var(--weight-medium);color:var(--text-primary);
      line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .steprow[data-done="true"] .steprow__label{color:var(--text-secondary)}
    .steprow__meta{display:block;font-size:var(--text-2xs);color:var(--text-muted);margin-top:1px;white-space:nowrap}
    .steprow--final .steprow__dot{border-style:dashed}
    .steprow--final[data-ready="true"] .steprow__dot{background:var(--accent);border-color:var(--accent);border-style:solid;color:#fff}

    .main{min-width:0;max-width:760px}
    .stepcard{background:var(--surface-raised);border:1px solid var(--border-subtle);border-radius:var(--radius-xl);
      box-shadow:var(--shadow-md);overflow:hidden}
    .stepcard__head{padding:var(--space-8) var(--space-8) var(--space-6)}
    .stepcard__eyebrow{display:flex;align-items:center;gap:var(--space-3);margin-bottom:var(--space-4);flex-wrap:wrap}
    .eyebrow-num{font-size:var(--text-xs);font-weight:var(--weight-semibold);letter-spacing:var(--tracking-caps);
      text-transform:uppercase;color:var(--accent);font-variant-numeric:tabular-nums;white-space:nowrap}
    .stepcard__title{font-family:var(--display-font);font-weight:var(--weight-regular);letter-spacing:var(--tracking-tight);
      font-size:var(--text-3xl);line-height:var(--leading-tight);color:var(--text-primary)}
    .stepcard__lede{margin-top:var(--space-4);font-size:var(--text-md);line-height:var(--leading-normal);
      color:var(--text-secondary);max-width:56ch}
    .stepcard__body{padding:0 var(--space-8) var(--space-8);display:flex;flex-direction:column;gap:var(--space-7)}

    .block-label{font-size:var(--text-xs);font-weight:var(--weight-semibold);letter-spacing:var(--tracking-caps);
      text-transform:uppercase;color:var(--text-muted);margin-bottom:var(--space-3)}

    .prose{font-size:var(--text-base);line-height:var(--leading-relaxed);color:var(--text-secondary)}
    .prose p{margin:0 0 var(--space-3)}
    .prose p:last-child{margin-bottom:0}
    .prose ol,.prose ul{margin:0;padding-left:0;list-style:none;display:flex;flex-direction:column;gap:var(--space-3)}
    .prose li{display:flex;gap:var(--space-3);align-items:flex-start}
    .li-num{flex:none;width:22px;height:22px;border-radius:50%;background:var(--accent-subtle);
      color:var(--accent-pressed);font-size:var(--text-xs);font-weight:var(--weight-semibold);
      display:grid;place-items:center;margin-top:2px;font-variant-numeric:tabular-nums}
    .li-tick{flex:none;color:var(--accent);margin-top:3px}
    .li-tick svg{width:16px;height:16px}

    .step-item{display:flex;flex-direction:column;gap:var(--space-3)}
    .step-item__row{display:flex;gap:var(--space-3);align-items:flex-start}
    .step-img{border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--border-subtle)}
    .step-img img{width:100%;height:auto;display:block}
    .step-img__cap{padding:var(--space-3);background:var(--surface-default);font-size:var(--text-sm);color:var(--text-secondary)}

    .actions{display:flex;flex-wrap:wrap;align-items:center;gap:var(--space-3);padding-top:var(--space-2)}
    .actions__spacer{flex:1}

    .cardfoot{display:flex;align-items:center;justify-content:space-between;gap:var(--space-4);
      border-top:1px solid var(--border-subtle);padding:var(--space-5) var(--space-8);background:var(--surface-default)}
    .cardfoot__nav{display:flex;gap:var(--space-2)}
    .helplink{display:inline-flex;align-items:center;gap:7px;background:none;border:none;cursor:pointer;
      font-size:var(--text-sm);font-weight:var(--weight-medium);color:var(--text-muted);padding:6px 4px;
      transition:color var(--duration-fast)}
    .helplink:hover{color:var(--danger)}
    .helplink svg{width:16px;height:16px}

    .donebar{display:flex;align-items:center;gap:var(--space-3);background:var(--success-bg);
      color:var(--success);font-size:var(--text-sm);font-weight:var(--weight-medium);
      padding:var(--space-3) var(--space-5);border-radius:var(--radius-md);
      border:1px solid color-mix(in oklch,var(--success) 22%,transparent)}
    .donebar svg{width:18px;height:18px;flex:none}

    .finalwrap{display:flex;flex-direction:column;gap:var(--space-6)}
    .checklist{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3)}
    @media(max-width:560px){.checklist{grid-template-columns:1fr}}
    .checkitem{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-4) var(--space-5);
      border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--surface-default);
      transition:all var(--duration-normal) var(--ease-standard);cursor:pointer;text-align:left}
    .checkitem[data-done="true"]{background:var(--success-bg);border-color:color-mix(in oklch,var(--success) 20%,transparent)}
    .checkitem__ic{width:26px;height:26px;border-radius:50%;flex:none;display:grid;place-items:center;
      border:1.5px solid var(--border-strong);color:var(--text-disabled)}
    .checkitem__ic svg{width:15px;height:15px}
    .checkitem[data-done="true"] .checkitem__ic{background:var(--success);border-color:var(--success);color:#fff}
    .checkitem__label{font-size:var(--text-sm);font-weight:var(--weight-medium);color:var(--text-primary);flex:1}
    .checkitem__sub{font-size:var(--text-2xs);color:var(--text-muted)}

    .readybanner{display:flex;align-items:center;gap:var(--space-5);padding:var(--space-7);
      border-radius:var(--radius-lg);background:linear-gradient(135deg,var(--clay-50),var(--neutral-50));
      border:1px solid var(--accent-border)}
    .readybanner--locked{background:var(--surface-default);border-color:var(--border-default)}
    .readybanner__ic{width:56px;height:56px;border-radius:50%;flex:none;display:grid;place-items:center;
      background:var(--accent);color:#fff;box-shadow:var(--shadow-md)}
    .readybanner--locked .readybanner__ic{background:var(--neutral-300);box-shadow:none}
    .readybanner__ic svg{width:28px;height:28px}
    .readybanner__title{font-family:var(--display-font);font-size:var(--text-2xl);letter-spacing:var(--tracking-tight);
      color:var(--text-primary);line-height:1.1}
    .readybanner__text{font-size:var(--text-sm);color:var(--text-secondary);margin-top:4px}


.overlay{position:fixed;inset:0;z-index:var(--z-modal);background:rgba(20,20,19,.42);
      backdrop-filter:blur(3px);display:grid;place-items:center;padding:var(--space-6);
      animation:fade var(--duration-normal) var(--ease-out)}
    @keyframes fade{from{opacity:0}}
    .modal{background:var(--surface-raised);border-radius:var(--radius-xl);box-shadow:var(--shadow-xl);
      width:100%;max-width:520px;max-height:88vh;overflow:auto;animation:pop var(--duration-normal) var(--ease-out)}
    .modal--wide{max-width:720px}
    @keyframes pop{from{opacity:0;transform:translateY(10px) scale(.98)}}
    .modal__head{padding:var(--space-7) var(--space-7) var(--space-4);display:flex;align-items:flex-start;gap:var(--space-4)}
    .modal__head-body{flex:1}
    .modal__title{font-family:var(--display-font);font-size:var(--text-2xl);letter-spacing:var(--tracking-tight);color:var(--text-primary);line-height:1.1}
    .modal__sub{font-size:var(--text-sm);color:var(--text-secondary);margin-top:6px}
    .modal__body{padding:var(--space-3) var(--space-7) var(--space-7);display:flex;flex-direction:column;gap:var(--space-5)}
    .modal__foot{display:flex;gap:var(--space-3);justify-content:flex-end;padding-top:var(--space-2)}
    .modal__x{flex:none}

    .faqlist{display:flex;flex-direction:column;gap:var(--space-3)}
    .faqitem{border:1px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--surface-default);overflow:hidden}
    .faqitem__q{width:100%;display:flex;align-items:center;gap:var(--space-3);text-align:left;
      background:none;border:none;cursor:pointer;padding:var(--space-5);font-size:var(--text-base);
      font-weight:var(--weight-medium);color:var(--text-primary)}
    .faqitem__q .chev{margin-left:auto;flex:none;color:var(--text-muted);transition:transform var(--duration-normal)}
    .faqitem__q .chev svg{width:18px;height:18px}
    .faqitem[data-open="true"] .chev{transform:rotate(180deg)}
    .faqitem__a{padding:0 var(--space-5) var(--space-5) calc(var(--space-5) + 30px);font-size:var(--text-sm);
      line-height:var(--leading-relaxed);color:var(--text-secondary)}
    .faqitem__q .qic{width:22px;height:22px;border-radius:50%;background:var(--accent-subtle);color:var(--accent-pressed);
      display:grid;place-items:center;flex:none;font-size:13px;font-weight:var(--weight-bold)}

    .toast{position:fixed;bottom:var(--space-7);left:50%;transform:translateX(-50%);z-index:var(--z-toast);
      background:var(--neutral-900);color:var(--neutral-50);padding:var(--space-3) var(--space-5);
      border-radius:var(--radius-pill);font-size:var(--text-sm);font-weight:var(--weight-medium);
      box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:8px;animation:toastin var(--duration-normal) var(--ease-out)}
    .toast svg{width:16px;height:16px;color:var(--clay-300)}
    @keyframes toastin{from{opacity:0;transform:translate(-50%,12px)}}

    .picker{min-height:100vh;display:grid;place-items:center;padding:var(--space-7)}
    .picker__inner{width:100%;max-width:720px;text-align:center}
    .picker__mark{width:52px;height:52px;margin:0 auto var(--space-6);display:block}
    .picker__eyebrow{font-size:var(--text-xs);font-weight:var(--weight-semibold);letter-spacing:var(--tracking-caps);
      text-transform:uppercase;color:var(--accent);margin-bottom:var(--space-4)}
    .picker__title{font-family:var(--display-font);font-weight:var(--weight-regular);letter-spacing:var(--tracking-tight);
      font-size:var(--text-5xl);line-height:var(--leading-tight);color:var(--text-primary)}
    .picker__lede{margin:var(--space-5) auto 0;max-width:52ch;font-size:var(--text-md);line-height:var(--leading-normal);color:var(--text-secondary)}
    .picker__cards{margin-top:var(--space-9);display:grid;grid-template-columns:1fr 1fr;gap:var(--space-5)}
    @media(max-width:560px){.picker__cards{grid-template-columns:1fr}}
    .oscard{background:var(--surface-raised);border:1px solid var(--border-default);border-radius:var(--radius-xl);
      padding:var(--space-8) var(--space-6);cursor:pointer;transition:all var(--duration-normal) var(--ease-standard);
      display:flex;flex-direction:column;align-items:center;gap:var(--space-4);box-shadow:var(--shadow-sm)}
    .oscard:hover{box-shadow:var(--shadow-lg);transform:translateY(-3px);border-color:var(--accent-border)}
    .oscard__ic{width:64px;height:64px;color:var(--neutral-800)}
    .oscard__ic svg{width:100%;height:100%}
    .oscard__name{font-size:var(--text-xl);font-weight:var(--weight-semibold);color:var(--text-primary)}
    .oscard__sub{font-size:var(--text-sm);color:var(--text-muted)}
    .picker__foot{margin-top:var(--space-7);font-size:var(--text-sm);color:var(--text-muted)}
    .hint-inline{font-size:var(--text-xs);color:var(--text-muted)}

    /* ── MOBILE ── */
    @media(max-width:640px){
      /* Topbar: 2 rows */
      .topbar__inner{flex-wrap:wrap;height:auto;padding:10px 16px 8px;gap:6px}
      .brand{flex:1}
      .brand__name span{display:none}
      .topbar__progress{order:3;width:100%;max-width:none;flex:none;padding-bottom:2px}
      .topbar__actions{gap:2px}
      .osseg__name{display:none}
      .osseg__btn{padding:6px 10px}
      .faq-label{display:none}

      /* Layout */
      .layout{padding:12px 12px 48px;gap:12px}

      /* Stepper → horizontal scrollable dots */
      .stepper{flex-direction:row;overflow-x:auto;-webkit-overflow-scrolling:touch;
        scrollbar-width:none;gap:2px;padding:4px 2px;top:auto}
      .stepper::-webkit-scrollbar{display:none}
      .stepper__head{display:none}
      .steprow{padding:4px;flex:none;width:34px;height:34px;justify-content:center;border-radius:50%}
      .steprow[aria-current="true"]::before{display:none}
      .steprow[aria-current="true"]{background:var(--accent-subtle);outline:2px solid var(--accent);outline-offset:1px}
      .steprow__body{display:none}

      /* stepcard */
      .stepcard{border-radius:var(--radius-lg)}
      .stepcard__head{padding:20px 16px 14px}
      .stepcard__title{font-size:var(--text-2xl)}
      .stepcard__lede{font-size:var(--text-base);margin-top:10px}
      .stepcard__body{padding:0 16px 20px;gap:20px}

      /* cardfoot */
      .cardfoot{padding:12px 16px;flex-wrap:wrap;gap:10px}
      .cardfoot__nav{width:100%;justify-content:flex-end}
      .helplink{font-size:var(--text-xs)}

      /* Picker */
      .picker{padding:24px 16px}
      .picker__title{font-size:var(--text-3xl)}
      .picker__lede{font-size:var(--text-base)}
      .picker__cards{margin-top:32px;gap:12px}
      .oscard{padding:24px 20px;flex-direction:row;justify-content:flex-start;text-align:left}
      .oscard__ic{width:40px;height:40px;flex:none}
      .oscard__name{font-size:var(--text-md)}

      /* Final */
      .readybanner{flex-direction:column;gap:16px}
      .readybanner__ic{width:44px;height:44px}
      .readybanner__ic svg{width:22px;height:22px}
      .readybanner__title{font-size:var(--text-xl)}
    }
  </style>
</head>

    const isUrlLike = s => /^https?:\/\//.test(s)||/^[a-z0-9][a-z0-9._-]*\.(com|ai|sh|org|io|net|ru|dev|app|scm|gov|edu)(\/.*)?$/i.test(s);

    function InlineCode({ content }) {
      const [copied,setCopied] = useState(false);
      const isLong = content.length > 48;
      const doCopy = e => {
        e.preventDefault(); e.stopPropagation();
        navigator.clipboard?.writeText(content);
        setCopied(true); setTimeout(()=>setCopied(false),1600);
      };
      const btn = (
        <button onClick={doCopy} title="Скопировать" style={{background:'none',border:'none',cursor:'pointer',padding:'0 0 0 6px',color:copied?'#4ade80':'rgba(255,255,255,.45)',lineHeight:1,display:'inline-flex',alignItems:'center',flexShrink:0}}>
          {copied
            ? <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
            : <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>}
        </button>
      );
      if (isLong) return (
        <span style={{display:'flex',alignItems:'flex-start',gap:4,background:'var(--neutral-900)',border:'1px solid rgba(255,255,255,.12)',borderRadius:'var(--radius-xs)',padding:'8px 10px',fontFamily:'var(--font-mono)',fontSize:'.85em',color:'#e2e8f0',marginTop:6,marginBottom:2,wordBreak:'break-word',whiteSpace:'pre-wrap'}}>
          <span style={{flex:1}}>{content}</span>{btn}
        </span>
      );
      return (
        <span style={{display:'inline-flex',alignItems:'center',gap:4,background:'var(--neutral-900)',border:'1px solid rgba(255,255,255,.12)',borderRadius:'var(--radius-xs)',padding:'2px 8px',fontFamily:'var(--font-mono)',fontSize:'.86em',color:'#e2e8f0',verticalAlign:'middle',whiteSpace:'nowrap'}}>
          {content}{btn}
        </span>
      );
    }

    function renderInline(text) {
      const parts=[]; const re=/(\[([^\]]+)\]\(([^)]+)\))|(`[^`]+`)|(\*\*[^*]+\*\*)/g;
      let last=0,m,k=0;
      while((m=re.exec(text))){
        if(m.index>last) parts.push(text.slice(last,m.index));
        if(m[1]){
          const label=m[2],href=m[3],url=href.startsWith('http')?href:`https://${href}`;
          parts.push(<a key={k++} href={url} target="_blank" rel="noopener noreferrer" style={{color:'var(--link)',textDecoration:'underline'}}>{label}</a>);
        } else if(m[0].startsWith('`')){
          const c=m[0].slice(1,-1);
          if(isUrlLike(c)){const url=c.startsWith('http')?c:`https://${c}`;parts.push(<a key={k++} href={url} target="_blank" rel="noopener noreferrer" style={{color:'var(--link)',fontFamily:'var(--font-mono)',fontSize:'.88em',textDecoration:'underline'}}>{c}</a>);}
          else parts.push(<InlineCode key={k++} content={c}/>);
        } else if(m[0].startsWith('**')){
          parts.push(<strong key={k++} style={{color:'var(--text-primary)',fontWeight:'var(--weight-semibold)'}}>{m[0].slice(2,-2)}</strong>);
        }
        last=m.index+m[0].length;
      }
      if(last<text.length) parts.push(text.slice(last));
      return parts;
    }

    /* ── INSTRUCTIONS W/ SCREENSHOTS ── */
    function InstructionsWithScreenshots({ text, screenshots=[], captions=[] }) {
      if(!text) return null;
      const lines=text.split('\n');
      const steps=[]; let curNum=null,curLines=[];
      lines.forEach(line=>{
        const m=line.match(/^(\d+)\./);
        if(m){
          if(curNum!==null&&curLines.length) steps.push({num:curNum,lines:curLines});
          curNum=parseInt(m[1]); curLines=[line];
        } else if(curNum!==null&&line.trim()) curLines.push(line);
      });
      if(curNum!==null&&curLines.length) steps.push({num:curNum,lines:curLines});
      if(!steps.length) return <div className="prose"><p>{renderInline(text)}</p></div>;
      return (
        <div style={{display:'flex',flexDirection:'column',gap:'var(--space-5)'}}>
          {steps.map(step=>{
            const cleanText=step.lines.join('\n').replace(/^\d+\.\s*/,'');
            const img=screenshots[step.num-1], cap=captions[step.num-1];
            return (
              <div key={step.num} className="step-item">
                <div className="step-item__row">
                  <span className="li-num" style={{flexShrink:0,marginTop:2}}>{step.num}</span>

            );
          })}
        </div>
      );
    }

            </button>
          ))}
          <button className="steprow steprow--final" aria-current={current===steps.length} data-ready={allDone} onClick={()=>setCurrent(steps.length)}>
            <span className="steprow__dot">{allDone?I.check:I.trophy}</span>
            <span className="steprow__body">
              <span className="steprow__label">Финальная проверка</span>
              <span className="steprow__meta">{allDone?'Готов к обучению':'Чек-лист готовности'}</span>
            </span>
          </button>
        </nav>
      );
    }


/* ── STEP VIEW ── */
    function StepView({step,os,done,toggleDone,onPrev,onNext,isFirst,onHelp}){
      const instructions=pick(step.instructions,os);
      const links=pick(step.links,os)||[];
      const screenshots=(step.perOS?pick(step.screenshots,os):step.screenshots)||[];
      const captions=(step.perOS?pick(step.screenshotCaptions,os):step.screenshotCaptions)||[];
      const isDone=!!done[step.id];
      return(
        <article className="stepcard">
          <div className="stepcard__head">
            <div className="stepcard__eyebrow">
              <span className="eyebrow-num">Шаг {step.num} из {STEPS.length-1}</span>
              {step.perOS&&<span className="cds-badge cds-badge--neutral">{OS[os].icon}{OS[os].name}</span>}
              {isDone&&<span className="cds-badge cds-badge--success">{I.check} Выполнено</span>}
            </div>
            <h1 className="stepcard__title">{step.title}</h1>
            <p className="stepcard__lede">{step.lede}</p>
          </div>
          <div className="stepcard__body">
            {instructions&&(
              <div>
                <div className="block-label">Инструкция</div>
                <InstructionsWithScreenshots text={instructions} screenshots={screenshots} captions={captions}/>
              </div>
            )}
            {isDone&&<div className="donebar">{I.checkBold} Этот шаг отмечен как выполненный. Можно переходить дальше.</div>}
            <div className="actions">
              {links.filter(l=>l.url||admin).map((l,i)=>(
                <Btn key={i} variant={l.primary?'primary':'secondary'} iconRight={I.external}
                  onClick={()=>l.url&&window.open(l.url,'_blank','noopener')} disabled={!l.url}>
                  {l.label}
                </Btn>
              ))}
              <span className="actions__spacer"/>
              <Btn variant={isDone?'secondary':'primary'} iconLeft={isDone?I.reset:I.check} onClick={()=>toggleDone(step.id)}>
                {isDone?'Отменить выполнение':'Шаг выполнен'}
              </Btn>
            </div>
          </div>
          <div className="cardfoot">
            <button className="helplink" onClick={()=>onHelp(step)}>{I.help} Не получается, нужна помощь</button>
            <div className="cardfoot__nav">
              <Btn variant="ghost" iconLeft={I.arrowL} onClick={onPrev} disabled={isFirst}>Назад</Btn>
              <Btn variant="secondary" iconRight={I.arrowR} onClick={onNext}>Далее</Btn>
            </div>
          </div>
        </article>
      );
    }

    /* ── FINAL VIEW ── */
    function FinalView({steps,done,allDone,onReset,goStep}){
      const doneCount=steps.filter(s=>done[s.id]).length;
      return(
        <article className="stepcard">
          <div className="stepcard__head">
            <div className="stepcard__eyebrow"><span className="eyebrow-num">Финальная проверка</span></div>
            <h1 className="stepcard__title">Готовность к обучению</h1>
            <p className="stepcard__lede">Проверьте, что все пункты отмечены. Когда чек-лист заполнен — вы полностью готовы к первому занятию.</p>
          </div>
          <div className="stepcard__body">
            <div className="finalwrap">
              <div className={'readybanner'+(allDone?'':' readybanner--locked')}>
                <div className="readybanner__ic">{allDone?I.trophy:I.lock}</div>
                <div>
                  <div className="readybanner__title">{allDone?'Готов к обучению':'Почти готово'}</div>
                  <div className="readybanner__text">{allDone
                    ?'Все шаги выполнены. Можно приходить на занятие — рабочее окружение настроено.'
                    :`Выполнено ${doneCount} из ${steps.length} шагов. Отметьте оставшиеся пункты, чтобы завершить подготовку.`}</div>
                </div>
              </div>
              <div>
                <div className="block-label">Чек-лист готовности</div>
                <div className="checklist">
                  {steps.map((s,i)=>(
                    <button className="checkitem" key={s.id} data-done={!!done[s.id]} onClick={()=>goStep(i)}>
                      <span className="checkitem__ic">{done[s.id]?I.check:''}</span>
                      <span className="checkitem__label">{s.check}</span>
                      {!done[s.id]&&<span className="checkitem__sub">шаг {s.num}</span>}
                    </button>
                  ))}
                </div>
              </div>
              <div className="actions">
                <Btn variant="ghost" iconLeft={I.reset} onClick={onReset}>Пройти заново</Btn>
                <span className="actions__spacer"/>
                {!allDone&&<Btn variant="primary" onClick={()=>{const i=steps.findIndex(s=>!done[s.id]);goStep(i<0?0:i);}}>Перейти к незавершённому</Btn>}
              </div>
            </div>
          </div>
        </article>
      );
    }

    /* ── FAQ MODAL ── */
    function FaqModal({onClose,onHelp}){
      const [open,setOpen]=useState(0);
      return(
        <Modal title="Частые проблемы" sub="Быстрые решения для типичных ситуаций при подготовке" onClose={onClose} wide>
          <div className="faqlist">
            {FAQ.map((f,i)=>(
              <div className="faqitem" key={i} data-open={open===i}>
                <button className="faqitem__q" onClick={()=>setOpen(open===i?-1:i)}>
                  <span className="qic">?</span>{f.q}<span className="chev">{I.chev}</span>
                </button>
                {open===i&&<div className="faqitem__a">{f.a}</div>}
              </div>
            ))}
          </div>
          <div className="modal__foot">
            <Btn variant="secondary" onClick={()=>{onClose();onHelp(null);}}>Моей проблемы нет — написать куратору</Btn>
          </div>
        </Modal>
      );
    }

    /* ── HELP MODAL ── */
    function HelpModal({step,os,onClose}){
      const [sent,setSent]=useState(false);
      const [form,setForm]=useState({name:'',contact:'',message:''});
      const upd=k=>e=>setForm(f=>({...f,[k]:e.target.value}));
      if(sent) return(
        <Modal title="Обращение отправлено" onClose={onClose}>
          <div className="donebar" style={{fontSize:'var(--text-base)'}}>{I.checkBold} Куратор получит ваше сообщение и свяжется с вами.</div>
          <p style={{fontSize:'var(--text-sm)',color:'var(--text-secondary)',marginTop:'var(--space-4)'}}>Если вопрос срочный: <strong>{CURATOR.telegram}</strong> или <strong>{CURATOR.email}</strong></p>
          <div className="modal__foot"><Btn onClick={onClose}>Понятно</Btn></div>
        </Modal>
      );
      return(
        <Modal title="Нужна помощь куратора" sub={step?`Шаг ${step.num}: ${step.title}`:'Общий вопрос по подготовке'} onClose={onClose}>
          <form onSubmit={e=>{e.preventDefault();setSent(true);}} style={{display:'flex',flexDirection:'column',gap:'var(--space-5)'}}>
            <Field label="Как к вам обращаться" placeholder="Имя" value={form.name} onChange={upd('name')} required/>
            <Field label="Контакт для ответа" hint="Telegram или почта" placeholder="@username или mail@example.com" value={form.contact} onChange={upd('contact')} required/>
            <Field label="В чём затруднение" multiline rows={4} placeholder="Опишите, что не получается, и что вы уже пробовали…" value={form.message} onChange={upd('message')} required/>
            <div className="hint-inline">Система: {OS[os].name}{step?` · автоматически приложим, что вы на шаге ${step.num}`:''}</div>
            <div className="modal__foot">
              <Btn variant="ghost" type="button" onClick={onClose}>Отмена</Btn>
              <Btn variant="primary" type="submit" iconRight={I.send}>Отправить куратору</Btn>
            </div>
          </form>
        </Modal>
      );
    }

    /* ── ROOT APP ── */
    function App(){
      const [os,setOsState]=useState(()=>load(LS.os,null));
      const [done,setDone]=useState(()=>load(LS.done,{}));
      const [current,setCurrent]=useState(0);
      const [faqOpen,setFaqOpen]=useState(false);
      const [helpStep,setHelpStep]=useState(undefined);
      const [toastNode,toast]=useToast();

      useEffect(()=>{save(LS.done,done);},[done]);
      useEffect(()=>{window.scrollTo({top:0,behavior:'smooth'});},[current]);

      const setOs=v=>{setOsState(v);save(LS.os,v);};
      const total=STEPS.length;
      const doneCount=STEPS.filter(s=>done[s.id]).length;
      const pct=Math.round((doneCount/total)*100);
      const allDone=doneCount===total;

      const toggleDone=id=>{
        setDone(prev=>{const next={...prev,[id]:!prev[id]};return next;});
        if(!done[id]){
          toast('Шаг отмечен выполненным');
          setTimeout(()=>setCurrent(c=>c<total-1?c+1:total),450);
        }
      };

      const resetAll=()=>{
        if(confirm('Сбросить весь прогресс и пройти подготовку заново? Установленные программы удалять не нужно.')){
          setDone({});setCurrent(0);toast('Прогресс сброшен');
        }
      };

      if(!os) return <>{<OsPicker onPick={setOs}/>}{toastNode}</>;

      const onFinal=current>=total;
      const step=STEPS[current];

      return(
        <div className="app">
          <TopBar os={os} setOs={setOs} pct={pct} doneCount={doneCount} total={total}
            onFaq={()=>setFaqOpen(true)} onReset={resetAll}/>
          <div className="layout">
            <Stepper steps={STEPS} current={current} setCurrent={setCurrent} done={done} allDone={allDone}/>
            <main className="main">
              {onFinal
                ?<FinalView steps={STEPS} done={done} allDone={allDone} onReset={resetAll} goStep={setCurrent}/>
                :<StepView step={step} os={os}
                    done={done} toggleDone={toggleDone}
                    onPrev={()=>setCurrent(c=>Math.max(0,c-1))}
                    onNext={()=>setCurrent(c=>Math.min(total,c+1))}
                    isFirst={current===0} onHelp={s=>setHelpStep(s)}/>
              }
            </main>
          </div>
          {faqOpen&&<FaqModal onClose={()=>setFaqOpen(false)} onHelp={s=>setHelpStep(s)}/>}
          {helpStep!==undefined&&<HelpModal step={helpStep} os={os} onClose={()=>setHelpStep(undefined)}/>}
          {toastNode}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
